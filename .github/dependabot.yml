version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-tooling:
        patterns:
          - "@vitejs/*"
          - "vite"
          - "vitest"
          - "typescript"
          - "storybook"
          - "@storybook/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "@playwright/*"
          - "@axe-core/*"
          - "axe-core"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
