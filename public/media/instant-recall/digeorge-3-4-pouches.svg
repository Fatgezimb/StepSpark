<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">DiGeorge third and fourth pouch diagram</title>
  <desc id="desc">A simplified pathway linking failed third and fourth pharyngeal pouch development to absent thymus, low T cells, absent parathyroids, and hypocalcemia.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101b36"/>
      <stop offset="1" stop-color="#24164a"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="560" rx="34" fill="url(#bg)"/>
  <text x="58" y="74" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">3rd/4th pouch failure</text>
  <text x="60" y="118" fill="#a5b4fc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">22q11 deletion pattern</text>
  <g fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M245 276h150"/>
    <path d="M506 276h150"/>
    <path d="M388 256l34 20-34 20"/>
    <path d="M649 256l34 20-34 20"/>
  </g>
  <g filter="url(#glow)">
    <rect x="72" y="180" width="176" height="192" rx="28" fill="#312e81" stroke="#818cf8" stroke-width="3"/>
    <text x="160" y="255" fill="#e0e7ff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle">3rd + 4th</text>
    <text x="160" y="292" fill="#c7d2fe" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">pouches</text>
  </g>
  <g>
    <rect x="426" y="164" width="170" height="96" rx="22" fill="#134e4a" stroke="#2dd4bf" stroke-width="3"/>
    <text x="511" y="222" fill="#ccfbf1" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle">Thymus</text>
    <rect x="426" y="294" width="170" height="96" rx="22" fill="#713f12" stroke="#fbbf24" stroke-width="3"/>
    <text x="511" y="352" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle">Parathyroid</text>
  </g>
  <g>
    <rect x="684" y="130" width="156" height="88" rx="20" fill="#0f766e" stroke="#5eead4" stroke-width="3"/>
    <text x="762" y="184" fill="#ccfbf1" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" text-anchor="middle">Low T cells</text>
    <rect x="684" y="236" width="156" height="88" rx="20" fill="#b45309" stroke="#fde68a" stroke-width="3"/>
    <text x="762" y="290" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" text-anchor="middle">Low Ca</text>
    <rect x="684" y="342" width="156" height="88" rx="20" fill="#7f1d1d" stroke="#fca5a5" stroke-width="3"/>
    <text x="762" y="396" fill="#fee2e2" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" text-anchor="middle">Tetany</text>
  </g>
</svg>
