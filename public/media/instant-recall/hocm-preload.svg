<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">HOCM preload maneuver diagram</title>
  <desc id="desc">A simplified chamber-size diagram showing reduced preload from Valsalva or standing causing narrower left ventricular cavity and louder dynamic obstruction.</desc>
  <rect width="900" height="560" rx="34" fill="#0b1328"/>
  <text x="54" y="74" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">HOCM maneuver rule</text>
  <text x="54" y="116" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Valsalva / standing -> lower preload -> louder murmur</text>
  <g transform="translate(74 168)">
    <rect width="300" height="300" rx="28" fill="#111c36" stroke="#334155" stroke-width="3"/>
    <path d="M106 52c64 34 96 34 158 0v196c-60-34-98-34-158 0z" fill="#1d4ed8" opacity=".34" stroke="#93c5fd" stroke-width="5"/>
    <path d="M164 78c28 62 28 122 0 184" stroke="#f87171" stroke-width="14" stroke-linecap="round"/>
    <text x="150" y="336" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Normal preload</text>
  </g>
  <path d="M414 318h120M500 286l42 32-42 32" fill="none" stroke="#a5b4fc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(552 168)">
    <rect width="300" height="300" rx="28" fill="#1e1b4b" stroke="#6366f1" stroke-width="3"/>
    <path d="M118 52c42 34 66 34 106 0v196c-39-34-66-34-106 0z" fill="#7c3aed" opacity=".35" stroke="#c4b5fd" stroke-width="5"/>
    <path d="M162 90c52 54 50 116 0 170" stroke="#fb7185" stroke-width="18" stroke-linecap="round"/>
    <text x="150" y="336" fill="#ede9fe" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle">Smaller LV cavity</text>
  </g>
</svg>
