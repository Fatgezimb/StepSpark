<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Vitamin B12 methylmalonic acid neuro clue diagram</title>
  <desc id="desc">A simplified pathway showing B12 deficiency causing macrocytosis, increased methylmalonic acid, and posterior column neurologic findings.</desc>
  <rect width="900" height="560" rx="34" fill="#0f172a"/>
  <text x="58" y="78" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">B12 vs folate separator</text>
  <g font-family="Inter, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <rect x="58" y="160" width="205" height="120" rx="26" fill="#1e3a8a" stroke="#60a5fa" stroke-width="3"/>
    <text x="160" y="232" fill="#dbeafe" font-size="28">Macrocytes</text>
    <rect x="348" y="160" width="205" height="120" rx="26" fill="#064e3b" stroke="#34d399" stroke-width="3"/>
    <text x="450" y="210" fill="#d1fae5" font-size="27">Increased</text>
    <text x="450" y="244" fill="#d1fae5" font-size="27">MMA</text>
    <rect x="638" y="160" width="205" height="120" rx="26" fill="#4c1d95" stroke="#a78bfa" stroke-width="3"/>
    <text x="740" y="210" fill="#ede9fe" font-size="27">Posterior</text>
    <text x="740" y="244" fill="#ede9fe" font-size="27">columns</text>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M280 220h52M320 196l28 24-28 24"/>
    <path d="M570 220h52M610 196l28 24-28 24"/>
  </g>
  <g>
    <path d="M240 394c44-70 91-70 140 0s96 70 140 0 91-70 140 0" fill="none" stroke="#fca5a5" stroke-width="11" stroke-linecap="round"/>
    <text x="450" y="462" fill="#fecaca" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="middle">Neurologic symptoms make B12 high-yield</text>
  </g>
</svg>
